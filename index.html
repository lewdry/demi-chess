<!doctype html>
<html lang="en" data-theme="caramellatte">
  <head>
    <script>
      // Resolve the theme before first paint (stored choice wins, otherwise
      // follow the OS preference) so there's no flash of the wrong theme.
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'forest' : 'caramellatte');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
